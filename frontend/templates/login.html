<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — FaceGuard Security Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
</head>
<body class="login-body">

  <div class="login-wrap">
    <div class="login-card">

      <!-- Brand -->
      <div class="login-brand">
        <div class="login-icon"><i class="fas fa-shield-halved"></i></div>
        <h1>FaceGuard</h1>
        <p>Smart Security Dashboard</p>
      </div>

      <!-- Flash -->
      {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for cat, msg in messages %}
        <div class="alert alert-{{ 'success' if cat == 'success' else ('warning' if cat == 'warning' else 'danger') }} py-2 mb-3">
          {{ msg }}
        </div>
        {% endfor %}
      {% endif %}
      {% endwith %}

      <!-- Form -->
      <form method="POST" action="/login" autocomplete="off">
        <div class="login-field">
          <label for="username"><i class="fas fa-user"></i> Username</label>
          <input type="text" id="username" name="username" class="login-input"
                 placeholder="admin" required autofocus>
        </div>
        <div class="login-field">
          <label for="password"><i class="fas fa-lock"></i> Password</label>
          <input type="password" id="password" name="password" class="login-input"
                 placeholder="••••••••" required>
        </div>
        <button type="submit" class="login-btn">
          <i class="fas fa-right-to-bracket"></i> Sign In
        </button>
      </form>

      <p class="login-footer">Raspberry Pi 4 · FaceNet · MTCNN</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
