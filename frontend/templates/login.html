<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — FaceVault Security</title>
  <meta name="description" content="FaceVault — AI-powered face recognition access control system. Sign in to your security dashboard.">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #060810;
      --surface:   rgba(255,255,255,0.04);
      --border:    rgba(255,255,255,0.08);
      --border-glow: rgba(99,102,241,0.5);
      --accent:    #6366f1;
      --accent2:   #22d3ee;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --danger:    #ef4444;
      --success:   #22c55e;
    }

    html, body {
      height: 100%;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ── Animated background ── */
    .login-bg {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 30%, rgba(99,102,241,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 70%, rgba(34,211,238,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 50% 50%, rgba(6,8,16,1) 0%, transparent 100%),
        #060810;
    }

    /* Animated grid */
    .login-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(99,102,241,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,102,241,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      animation: gridPulse 8s ease-in-out infinite;
    }
    @keyframes gridPulse {
      0%,100% { opacity: 0.5; } 50% { opacity: 1; }
    }

    /* Floating orbs */
    .orb {
      position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0;
      animation: orbFloat 12s ease-in-out infinite;
    }
    .orb-1 { width: 400px; height: 400px; background: rgba(99,102,241,0.15); top: -100px; left: -100px; animation-delay: 0s; }
    .orb-2 { width: 300px; height: 300px; background: rgba(34,211,238,0.10); bottom: -80px; right: -80px; animation-delay: -6s; }
    @keyframes orbFloat {
      0%,100% { transform: translate(0,0) scale(1); }
      33%  { transform: translate(30px, -20px) scale(1.05); }
      66%  { transform: translate(-20px, 30px) scale(0.97); }
    }

    /* ── Centering wrapper ── */
    .login-wrap {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    /* ── Card ── */
    .login-card {
      width: 100%; max-width: 420px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 36px 36px;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04),
        0 20px 60px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.08);
      animation: cardIn 0.6s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(32px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Logo / brand ── */
    .login-logo {
      display: flex; align-items: center; justify-content: center;
      width: 64px; height: 64px; border-radius: 16px;
      background: linear-gradient(135deg, rgba(99,102,241,0.3), rgba(34,211,238,0.2));
      border: 1px solid rgba(99,102,241,0.4);
      margin: 0 auto 20px;
      position: relative;
      box-shadow: 0 0 24px rgba(99,102,241,0.3);
    }
    .login-logo i { font-size: 1.6rem; color: var(--accent); }
    .login-logo::after {
      content: '';
      position: absolute; inset: -1px; border-radius: 17px;
      background: linear-gradient(135deg, rgba(99,102,241,0.5), transparent, rgba(34,211,238,0.3));
      z-index: -1; opacity: 0;
      animation: logoPulse 3s ease-in-out infinite;
    }
    @keyframes logoPulse { 0%,100% { opacity: 0; } 50% { opacity: 1; } }

    .login-brand-name {
      text-align: center; margin-bottom: 4px;
      font-size: 1.6rem; font-weight: 800; letter-spacing: -0.02em;
      background: linear-gradient(135deg, #fff 30%, var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .login-brand-sub {
      text-align: center; font-size: 0.72rem;
      color: var(--muted); letter-spacing: 0.12em;
      text-transform: uppercase; margin-bottom: 28px;
      font-family: 'JetBrains Mono', monospace;
    }

    /* ── Alert flash ── */
    .flash-alert {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px; border-radius: 10px;
      font-size: 0.8rem; margin-bottom: 18px;
      border: 1px solid;
    }
    .flash-alert.danger  { background: rgba(239,68,68,0.1);  border-color: rgba(239,68,68,0.3);  color: #fca5a5; }
    .flash-alert.success { background: rgba(34,197,94,0.1);  border-color: rgba(34,197,94,0.3);  color: #86efac; }
    .flash-alert.warning { background: rgba(234,179,8,0.1);  border-color: rgba(234,179,8,0.3);  color: #fde047; }

    /* ── Form fields ── */
    .field-group { margin-bottom: 16px; }
    .field-label {
      display: block; font-size: 0.72rem; font-weight: 600;
      color: var(--muted); letter-spacing: 0.08em;
      text-transform: uppercase; margin-bottom: 8px;
    }
    .field-wrap {
      position: relative;
    }
    .field-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--muted); font-size: 0.8rem; pointer-events: none;
      transition: color 0.2s;
    }
    .field-input {
      width: 100%; padding: 12px 14px 12px 38px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }
    .field-input::placeholder { color: var(--muted); }
    .field-input:focus {
      border-color: var(--accent);
      background: rgba(99,102,241,0.06);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
    }
    .field-input:focus + .field-icon,
    .field-wrap:focus-within .field-icon { color: var(--accent); }

    /* password eye toggle */
    .eye-btn {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 0.8rem; padding: 4px;
      transition: color 0.2s;
    }
    .eye-btn:hover { color: var(--text); }

    /* ── Submit button ── */
    .submit-btn {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, var(--accent) 0%, #4f46e5 100%);
      border: none; border-radius: 10px;
      color: #fff; font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.9rem; font-weight: 700;
      cursor: pointer; margin-top: 8px;
      position: relative; overflow: hidden;
      transition: transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(99,102,241,0.4);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .submit-btn::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 50%);
      opacity: 0; transition: opacity 0.2s;
    }
    .submit-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(99,102,241,0.5); }
    .submit-btn:hover::before { opacity: 1; }
    .submit-btn:active { transform: translateY(0); }

    /* ── Footer tags ── */
    .login-tags {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-top: 24px; flex-wrap: wrap;
    }
    .login-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem; color: var(--muted);
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 6px; padding: 3px 8px;
      letter-spacing: 0.05em;
    }

    /* ── Scan line animation across card ── */
    .login-card::before {
      content: '';
      position: absolute; top: -1px; left: 0; right: 0;
      height: 2px; border-radius: 20px 20px 0 0;
      background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
      animation: scanLine 4s ease-in-out infinite;
    }
    .login-card { position: relative; }
    @keyframes scanLine {
      0%   { transform: scaleX(0); opacity: 0; transform-origin: left; }
      50%  { transform: scaleX(1); opacity: 1; transform-origin: left; }
      51%  { transform-origin: right; }
      100% { transform: scaleX(0); opacity: 0; transform-origin: right; }
    }
  </style>
</head>
<body>
  <div class="login-bg"></div>
  <div class="login-grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="login-wrap">
    <div class="login-card">

      <!-- Brand -->
      <div class="login-logo">
        <i class="fas fa-shield-halved"></i>
      </div>
      <div class="login-brand-name">FaceVault</div>
      <div class="login-brand-sub">Secure Access Control System</div>

      <!-- Flash messages -->
      {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for cat, msg in messages %}
        <div class="flash-alert {{ 'success' if cat == 'success' else ('warning' if cat == 'warning' else 'danger') }}">
          <i class="fas fa-{{ 'check-circle' if cat == 'success' else ('triangle-exclamation' if cat == 'warning' else 'circle-xmark') }}"></i>
          {{ msg }}
        </div>
        {% endfor %}
      {% endif %}
      {% endwith %}

      <!-- Login form -->
      <form method="POST" action="/login" autocomplete="off">
        <div class="field-group">
          <label class="field-label" for="username">Username</label>
          <div class="field-wrap">
            <i class="fas fa-user field-icon"></i>
            <input type="text" id="username" name="username" class="field-input"
                   placeholder="admin" required autofocus>
          </div>
        </div>

        <div class="field-group">
          <label class="field-label" for="password">Password</label>
          <div class="field-wrap">
            <i class="fas fa-lock field-icon"></i>
            <input type="password" id="password" name="password" class="field-input"
                   placeholder="••••••••" required>
            <button type="button" class="eye-btn" id="eye-toggle" onclick="togglePwd()" aria-label="Toggle password visibility">
              <i class="fas fa-eye" id="eye-icon"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="submit-btn" id="signin-btn">
          <i class="fas fa-right-to-bracket"></i> Sign In
        </button>
      </form>

      <!-- Footer tags -->
      <div class="login-tags">
        <span class="login-tag">RPi 4</span>
        <span class="login-tag">FaceNet</span>
        <span class="login-tag">MTCNN</span>
        <span class="login-tag">AES-256</span>
      </div>
    </div>
  </div>

  <script>
    function togglePwd() {
      const input = document.getElementById('password');
      const icon  = document.getElementById('eye-icon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'fas fa-eye-slash';
      } else {
        input.type = 'password';
        icon.className = 'fas fa-eye';
      }
    }
  </script>
</body>
</html>
